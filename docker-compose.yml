version: "3.9"

services:
  # ─── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aistudio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aistudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aistudio_secret}
      POSTGRES_DB: ${POSTGRES_DB:-aistudio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aistudio}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aistudio_net

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aistudio_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aistudio_net

  # ─── Ollama (LLM Runtime) ─────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: aistudio_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 8G
    networks:
      - aistudio_net

  # ─── ChromaDB (Vector DB) ─────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: aistudio_chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      CHROMA_SERVER_AUTH_CREDENTIALS: ${CHROMA_AUTH_TOKEN:-chromadb_token}
      CHROMA_SERVER_AUTH_PROVIDER: chromadb.auth.token.TokenAuthServerProvider
      CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER: chromadb.auth.token.TokenConfigServerAuthCredentialsProvider
    networks:
      - aistudio_net

  # ─── FastAPI Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aistudio_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aistudio}:${POSTGRES_PASSWORD:-aistudio_secret}@postgres:5432/${POSTGRES_DB:-aistudio}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      CHROMA_AUTH_TOKEN: ${CHROMA_AUTH_TOKEN:-chromadb_token}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey_change_in_production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-encryptionkey32byteslong_changeit}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/2
      ENVIRONMENT: ${ENVIRONMENT:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - aistudio_net

  # ─── Celery Worker ────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aistudio_celery
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q default,agents,workflows
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aistudio}:${POSTGRES_PASSWORD:-aistudio_secret}@postgres:5432/${POSTGRES_DB:-aistudio}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      CHROMA_AUTH_TOKEN: ${CHROMA_AUTH_TOKEN:-chromadb_token}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey_change_in_production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-encryptionkey32byteslong_changeit}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/2
    depends_on:
      - backend
      - redis
    volumes:
      - uploads_data:/app/uploads
    networks:
      - aistudio_net

  # ─── Celery Beat (Scheduler) ──────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aistudio_beat
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info --scheduler redbeat.RedBeatScheduler
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/2
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
    depends_on:
      - redis
    networks:
      - aistudio_net

  # ─── Next.js Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: aistudio_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    networks:
      - aistudio_net

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  chroma_data:
  uploads_data:

networks:
  aistudio_net:
    driver: bridge
